<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entry Full-Pixel Converter</title>
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px; 
            margin: 0;
        }
        .container { 
            background: #161b22; 
            padding: 35px; 
            border-radius: 15px; 
            width: 90%; 
            max-width: 850px; 
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #58a6ff; font-weight: 600; margin-bottom: 25px; }
        .info {
            background: #010409;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            color: #8b949e;
            text-align: left;
            line-height: 1.5;
        }
        input[type="file"] { margin: 20px 0; font-size: 0.9rem; }
        button { 
            background: #238636; 
            color: #ffffff; 
            border: none; 
            padding: 14px 40px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background: #2ea043; }
        textarea { 
            width: 100%; 
            height: 350px; 
            margin-top: 30px; 
            background: #0d1117; 
            color: #d2a8ff; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            font-family: 'Cascadia Code', 'Consolas', monospace; 
            font-size: 11px; 
            word-break: break-all; 
            padding: 15px;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ENTRY FULL-PIXEL DATA GENERATOR</h1>
    
    <div class="info">
        • <b>해상도:</b> 480 x 270 (전체 좌표 포함)<br>
        • <b>데이터 규격:</b> [XXX][YYY]C[HEX] (항목당 14자 고정)<br>
        • <b>총 글자 수:</b> 1,814,400자 (누락 없는 고정 데이터)
    </div>

    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="processImage()">데이터 생성</button>
    
    <textarea id="output" readonly placeholder="파일을 선택하고 버튼을 누르면 코드가 생성됩니다."></textarea>
</div>

<canvas id="mainCanvas" width="480" height="270" style="display:none;"></canvas>

<script>
    function processImage() {
        const fileInput = document.getElementById('imageInput');
        if (!fileInput.files[0]) return alert("파일을 선택해 주십시오.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('mainCanvas');
                const ctx = canvas.getContext('2d');
                
                // 엔트리 16:9 규격으로 강제 리사이징 후 그리기
                ctx.clearRect(0, 0, 480, 270);
                ctx.drawImage(img, 0, 0, 480, 270);
                
                const imgData = ctx.getImageData(0, 0, 480, 270).data;
                let codeResult = "";

                // 모든 픽셀 순회 (투명도 제외 로직 삭제)
                for (let y = 0; y < 270; y++) {
                    for (let x = 0; x < 480; x++) {
                        const i = (y * 480 + x) * 4;

                        // 좌표 세 자리 패딩 (000~479 / 000~269)
                        const padX = x.toString().padStart(3, '0');
                        const padY = y.toString().padStart(3, '0');
                        
                        // 색상 추출 (RGB)
                        const r = imgData[i].toString(16).padStart(2, '0');
                        const g = imgData[i+1].toString(16).padStart(2, '0');
                        const b = imgData[i+2].toString(16).padStart(2, '0');
                        const hex = `#${r}${g}${b}`;

                        // (x3)(y3)C(hex) 형식 결합
                        codeResult += `${padX}${padY}C${hex}`;
                    }
                }
                document.getElementById('output').value = codeResult;
                alert("모든 좌표에 대한 코드 생성이 완료되었습니다.");
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
    }
</script>

</body>
</html>
