<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Converter</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 90%; max-width: 800px; text-align: center; }
        input[type="file"] { margin: 20px 0; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        textarea { width: 100%; height: 400px; margin-top: 25px; background: #020617; color: #10b981; border: 1px solid #334155; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; padding: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <input type="file" id="imgInput" accept="image/*">
        <br>
        <button onclick="convert()">코드 생성</button>
        <textarea id="result" readonly></textarea>
    </div>
    <canvas id="cvs" width="480" height="270" style="display:none;"></canvas>
    <script>
        function convert() {
            const file = document.getElementById('imgInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const cvs = document.getElementById('cvs');
                    const ctx = cvs.getContext('2d');
                    ctx.drawImage(img, 0, 0, 480, 270);
                    const data = ctx.getImageData(0, 0, 480, 270).data;
                    let res = "";
                    for (let y = 0; y < 270; y += 2) {
                        for (let x = 0; x < 480; x += 2) {
                            const i = (y * 480 + x) * 4;
                            const px = x.toString().padStart(3, '0');
                            const py = y.toString().padStart(3, '0');
                            const r = data[i].toString(16).padStart(2, '0');
                            const g = data[i+1].toString(16).padStart(2, '0');
                            const b = data[i+2].toString(16).padStart(2, '0');
                            res += px + py + r + g + b;
                        }
                    }
                    document.getElementById('result').value = res;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
